name: Build & Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: dev
        type: choice
        options: [dev, prod]

# Cancel in-flight runs on the same branch to avoid resource contention
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AZURE_RESOURCE_GROUP_DEV: rg-todots-dev
  AZURE_RESOURCE_GROUP_PROD: rg-todots-prod
  IMAGE_NAME: todo-api

jobs:
  # ── 1. Test ────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install root deps
        run: npm ci

      - name: Install server deps
        run: npm ci
        working-directory: server

      - name: Install client deps
        run: npm ci
        working-directory: client

      - name: Lint
        run: npm run lint

      - name: Test backend
        run: npm test
        working-directory: server

      - name: Test frontend
        run: npm test
        working-directory: client

  # ── 2. Build backend image ────────────────────────────────────────────────
  build-backend:
    name: Build & push backend image
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      image-full: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get ACR login server
        id: acr
        run: |
          # Derive ACR name from the workflow input
          ENV=${{ inputs.environment }}
          ACR_NAME="todots${ENV}acr"
          echo "name=${ACR_NAME}" >> "$GITHUB_OUTPUT"
          echo "server=${ACR_NAME}.azurecr.io" >> "$GITHUB_OUTPUT"

      - name: Log in to ACR
        run: az acr login --name ${{ steps.acr.outputs.name }}

      - name: Build backend (TypeScript compile)
        run: |
          npm ci
          npm run build:server
        working-directory: server

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.acr.outputs.server }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── 3. Deploy infrastructure ──────────────────────────────────────────────
  deploy-infra:
    name: Deploy Bicep infrastructure
    runs-on: ubuntu-latest
    needs: build-backend
    environment: ${{ inputs.environment == 'prod' && 'production' || 'development' }}
    outputs:
      backend-url: ${{ steps.deploy.outputs.backendUrl }}
      frontend-url: ${{ steps.deploy.outputs.frontendUrl }}
      acr-server: ${{ steps.deploy.outputs.acrLoginServer }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set environment variables
        id: env
        run: |
          echo "params=infra/parameters/${{ inputs.environment }}.bicepparam" >> "$GITHUB_OUTPUT"

      - name: Deploy Bicep (subscription scope)
        id: deploy
        uses: azure/arm-deploy@v2
        with:
          scope: subscription
          region: centralindia
          template: infra/main.bicep
          parameters: >
            ${{ steps.env.outputs.params }}
            containerImage=${{ needs.build-backend.outputs.image-full }}
          failOnStdErr: false

  # ── 4. Deploy frontend ────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy frontend to Static Web Apps
    runs-on: ubuntu-latest
    needs: deploy-infra
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install client deps
        run: npm ci
        working-directory: client

      - name: Build frontend
        run: npm run build
        working-directory: client
        env:
          # On Free SKU, the frontend calls the backend URL directly.
          # On Standard SKU with linkedBackend, this env var is optional
          # (SWA proxies /api/* automatically).
          VITE_API_BASE_URL: ${{ needs.deploy-infra.outputs.backend-url }}

      - name: Deploy to Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: client
          output_location: dist
          skip_app_build: true # Already built above

